type Scheduler__Indexer {
    peerId: String @index(unique: true)
    defraPk: String @index(unique: true)
    httpUrl: String
    multiaddr: String
    chain: String @index
    network: String @index
    currentTip: Int
    snapshotRanges: String
    pricing: String
    reliabilityScore: Float
    lastHeartbeat: String
    registeredAt: String
    status: String @index
}

type Scheduler__Host {
    peerId: String @index(unique: true)
    defraPk: String @index(unique: true)
    httpUrl: String
    multiaddr: String
    chain: String @index
    network: String @index
    lastHeartbeat: String
    registeredAt: String
    status: String @index
    budget: String
}

type Scheduler__Subscription {
    subscriptionId: String @index(unique: true)
    hostId: String @index
    indexerId: String @index
    subType: String
    blockFrom: Int
    blockTo: Int
    status: String @index
    paymentRef: String
    createdAt: String
    activatedAt: String
    expiresAt: String
    metadata: String
}

type Scheduler__ProbeResult {
    indexerId: String @index
    probedAt: String
